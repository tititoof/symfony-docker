security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: auto

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        login:
            pattern: ^/api/auth/login
            stateless: true
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
        register:
            pattern: ^/api/auth/register
            stateless: true
            security: false

        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            # Activate different ways to authenticate:
            # https://symfony.com/doc/current/security.html#the-firewall

            # https://symfony.com/doc/current/security/impersonating_user.html
            # switch_user: true

    # Note: Only the *first* matching rule is applied
    access_control:
        # - { path: ^/admin, roles: ROLE_ADMIN }
        # - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/api/auth/login,    roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }

        # Lecture : tous les utilisateurs connectés
        - { path: ^/api/articles,   methods: [GET], roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/categories, methods: [GET], roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/users,      methods: [GET], roles: IS_AUTHENTICATED_FULLY }

        # Écriture articles : ROLE_WRITER ou ROLE_ADMIN
        - { path: ^/api/articles, methods: [POST, PUT, PATCH, DELETE], roles: ROLE_WRITER }

        # Gestion users/catégories : ROLE_ADMIN uniquement
        - { path: ^/api/users,      methods: [POST, PUT, PATCH, DELETE], roles: ROLE_ADMIN }
        - { path: ^/api/categories, methods: [POST, PUT, PATCH, DELETE], roles: ROLE_ADMIN }
    role_hierarchy:
        ROLE_WRITER: ROLE_USER           # WRITER hérite de USER
        ROLE_ADMIN:  [ROLE_WRITER, ROLE_USER]  # ADMIN hérite de tout
when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
